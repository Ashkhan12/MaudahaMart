name: Jcode Continuous Autonomous Development & Maintenance Agent

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  schedule:
    # Runs continuously every hour to develop, optimize, and maintain the codebase
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  jcode-continuous-dev:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write

    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js Environment
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: 📦 Install Dependencies
        run: npm ci || npm install

      - name: 🔍 Run Typecheck & Linting
        id: lint
        run: npm run lint
        continue-on-error: true

      - name: 🛠️ Run Jcode Autonomous Agent Harness
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node scripts/jcode-agent.js

      - name: ⚙️ Build Applet Verification
        run: npm run build

      - name: 🚀 Auto-Commit & Push Continuous Upgrades (if changes generated)
        run: |
          git config --global user.name "Jcode AI Auto-Developer"
          git config --global user.email "jcode-bot@maudahamart.internal"
          git add -A
          if ! git diff-index --quiet HEAD; then
            git commit -m "feat(jcode): autonomous real-time codebase development & maintenance"
            git push origin ${{ github.ref_name }} || echo "No changes to push or permission limited"
          else
            echo "No codebase changes required."
          fi

